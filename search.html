<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <title>Suche</title>
  <link rel="stylesheet" href="assets/search.css">
</head>
<body>
  <main class="local-search">
    <h1>Suche</h1>
    <form class="local-search__form" data-local-search-form role="search">
      <label class="sr-only" for="site-search">Website durchsuchen</label>
      <input id="site-search" class="local-search__input" data-local-search-input type="search" name="q" autocomplete="off" placeholder="Suchbegriff eingeben">
      <button class="local-search__button" type="submit">Suchen</button>
    </form>
    <p class="local-search__status" data-local-search-status aria-live="polite"></p>
    <section data-local-search-results aria-label="Suchergebnisse"></section>
  </main>
  <script src="assets/search.js" defer></script>
</body>
</html>
