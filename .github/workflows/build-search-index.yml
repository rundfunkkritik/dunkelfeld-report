name: Suchindex aktualisieren

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Suchindex erzeugen
        run: python scripts/build_search_index.py --root . --output search-index.json
      - name: Änderungen speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add search-index.json
          git diff --cached --quiet || git commit -m "Suchindex aktualisieren"
          git push
